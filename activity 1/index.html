<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>boot strap typography</title>
     <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
       <h1 class="display-1">codingal</h1>
       <h2 class="display-2">codingal</h2>
       <h3 class="display-3">codingal</h3>
         <h4 class="display-4">codingal</h4>
    </div>
    <div class="container">
        <h1><small>lighter secondary text with small tag and class muted</small>
        <small class="text-muted">hello codingal</small></h1>
        <dl>
            <dt>coffee</dt>
            <dd>light hot drink</dd>
        </dl>
    </div>
</body>
</html>
